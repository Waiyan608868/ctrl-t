<!DOCTYPE html>
<html>
<head>
  <title>CTRL-T | Talento</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
    input, button { padding:10px; margin:5px; }
    .card { background:#1e293b; padding:15px; margin:10px 0; }
  </style>
</head>
<body>

<h1>CTRL-T (Talento)</h1>

<h2>Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signUp()">Sign Up</button>

<h2>Login</h2>
<button onclick="login()">Login</button>

<h2>Post Job</h2>
<input id="title" placeholder="Job Title">
<input id="company" placeholder="Company">
<input id="location" placeholder="Location">
<button onclick="postJob()">Post</button>

<h2>Jobs</h2>
<div id="jobs"></div>

<script>
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_PUBLIC_ANON_KEY"
);

async function signUp() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signUp({ email, password });
  if(error) alert(error.message);
  else alert("Registered! Check your email.");
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if(error) alert(error.message);
  else alert("Logged in!");
}

async function postJob() {
  const { data: user } = await supabase.auth.getUser();

  const title = document.getElementById('title').value;
  const company = document.getElementById('company').value;
  const location = document.getElementById('location').value;

  await supabase.from('jobs').insert([
    { title, company, location, created_by: user.user.id }
  ]);

  loadJobs();
}

async function loadJobs() {
  const { data } = await supabase.from('jobs').select("*");

  const container = document.getElementById('jobs');
  container.innerHTML = "";

  data.forEach(job => {
    container.innerHTML += `
      <div class="card">
        <h3>${job.title}</h3>
        <p>${job.company} - ${job.location}</p>
      </div>
    `;
  });
}

loadJobs();
</script>

</body>
</html>
